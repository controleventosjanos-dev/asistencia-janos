<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Registro de empleados</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#f1f5f9;min-height:100vh;padding:24px}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.08);
      padding:28px 24px;max-width:400px;margin:0 auto}
h2{font-size:20px;color:#1e3a8a;margin-bottom:6px}
.salon-tag{font-size:12px;color:#94a3b8;margin-bottom:20px}
label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;
      font-size:15px;margin-bottom:16px;outline:none}
input:focus{border-color:#1e40af}
video{width:100%;border-radius:12px;background:#000;aspect-ratio:4/3;
      object-fit:cover;display:block;margin-bottom:16px}
canvas{display:none}
button{width:100%;padding:13px;background:#1e3a8a;color:#fff;border:none;
       border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
button:disabled{opacity:.5}
#msg{margin-top:14px;font-size:14px;padding:10px 14px;border-radius:8px;display:none}
.ok{background:#dcfce7;color:#166534}
.err{background:#fee2e2;color:#991b1b}
#gps-info{font-size:12px;color:#94a3b8;margin-bottom:16px;min-height:18px}
</style>
</head>
<body>
<div class="card">
  <h2>&#128203; Registrar empleado</h2>
  <div class="salon-tag">Janos Bella Vista 2 &mdash; Panel Admin</div>
  <div id="gps-info">&#128205; Verificando ubicacion...</div>

  <label>ID empleado</label>
  <input id="empId" type="text" placeholder="EMP001">
  <label>Nombre completo</label>
  <input id="empName" type="text" placeholder="Maria Garcia">
  <label>Camara</label>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <button id="btn" onclick="registrar()">&#128248; Tomar foto y registrar</button>
  <div id="msg"></div>
</div>

<script>
var API_URL = "https://p710uk49qg.execute-api.us-east-2.amazonaws.com/prod";
var LAT_SALON = -34.56579223324552;
var LON_SALON = -58.701169532763934;
var RADIO_M = 100;

var TOKEN_OK = (new URLSearchParams(location.search).get("token") || "") === "janos2026admin";
if (!TOKEN_OK) {
  document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:48px">&#128274;</div><p style="margin-top:16px;color:#64748b">Acceso no autorizado</p></div>';
}

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

navigator.geolocation.getCurrentPosition(
  function(pos) {
    var dist = haversine(pos.coords.latitude, pos.coords.longitude, LAT_SALON, LON_SALON);
    var info = document.getElementById("gps-info");
    if (dist <= RADIO_M) {
      info.style.color = "#16a34a";
      info.textContent = "OK Ubicacion verificada - " + Math.round(dist) + "m del salon";
    } else {
      info.style.color = "#f59e0b";
      info.textContent = "Aviso: Registrando desde " + Math.round(dist) + "m del salon";
    }
  },
  function() {
    document.getElementById("gps-info").textContent = "Ubicacion no disponible";
  },
  { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
);

navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
  .then(function(s) { document.getElementById("video").srcObject = s; })
  .catch(function() { mostrarMsg("No se pudo acceder a la camara.", false); });

function mostrarMsg(txt, ok) {
  var el = document.getElementById("msg");
  el.textContent = txt;
  el.className = ok ? "ok" : "err";
  el.style.display = "block";
}

async function registrar() {
  var empId   = document.getElementById("empId").value.trim();
  var empName = document.getElementById("empName").value.trim();
  if (!empId || !empName) { mostrarMsg("Completa ID y nombre.", false); return; }

  var btn = document.getElementById("btn");
  btn.disabled = true;
  mostrarMsg("Registrando...", true);

  var video  = document.getElementById("video");
  var canvas = document.getElementById("canvas");
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  var b64 = canvas.toDataURL("image/jpeg", 0.9).split(",")[1];

  try {
    var res  = await fetch(API_URL + "/registrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ employeeId: empId, name: empName, imageBase64: b64 })
    });
    var data = await res.json();
    if (data.success) {
      mostrarMsg("OK " + empName + " registrado (FaceId: " + data.faceId.substring(0,8) + "...)", true);
      document.getElementById("empId").value   = "";
      document.getElementById("empName").value = "";
    } else {
      mostrarMsg("Error: " + (data.error || "desconocido"), false);
    }
  } catch(e) {
    mostrarMsg("Error de conexion: " + e.message, false);
  }
  btn.disabled = false;
}
</script>
</body>
</html>
