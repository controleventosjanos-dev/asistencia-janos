<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Registro de empleados</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: #f1f5f9; min-height: 100vh; display: flex;
       align-items: center; justify-content: center; padding: 16px; }
.card { background: white; border-radius: 16px; padding: 28px 24px;
        width: 100%; max-width: 420px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
h2 { font-size: 1.4rem; color: #1e3a5f; margin-bottom: 4px; }
.salon-tag { font-size: 0.82rem; color: #64748b; margin-bottom: 14px; }
#gps-info { font-size: 0.82rem; color: #64748b; margin-bottom: 16px;
            padding: 8px 12px; background: #f8fafc; border-radius: 8px; }
label { display: block; font-size: 0.78rem; font-weight: 600;
        color: #475569; margin-bottom: 4px; margin-top: 12px; }
input { width: 100%; padding: 10px 14px; border: 1.5px solid #cbd5e1;
        border-radius: 10px; font-size: 0.95rem; outline: none;
        transition: border-color 0.2s; }
input:focus { border-color: #3b82f6; }
.cam-wrap { position: relative; margin-top: 16px; margin-bottom: 4px;
            background: #0f172a; border-radius: 12px; overflow: hidden; }
video { width: 100%; display: block; border-radius: 12px;
        min-height: 200px; }
canvas { display: none; }
#btn-flip { position: absolute; top: 10px; right: 10px; z-index: 10;
            background: rgba(0,0,0,0.55); border: none; border-radius: 50%;
            width: 44px; height: 44px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.3rem; transition: background 0.2s; }
#btn-flip:hover { background: rgba(0,0,0,0.80); }
#btn { width: 100%; margin-top: 16px; padding: 13px;
       background: #1e3a5f; color: white; border: none;
       border-radius: 12px; font-size: 1rem; font-weight: 600;
       cursor: pointer; transition: background 0.2s; }
#btn:hover:not(:disabled) { background: #2d5a8e; }
#btn:disabled { opacity: 0.6; cursor: not-allowed; }
#msg { margin-top: 14px; padding: 10px 14px; border-radius: 10px;
       font-size: 0.9rem; display: none; font-weight: 500; }
#msg.ok { background: #dcfce7; color: #15803d; }
#msg.err { background: #fee2e2; color: #b91c1c; }
</style>
</head>
<body>
<div class="card">
  <h2>&#128203; Registrar empleado</h2>
  <div class="salon-tag">Janos Bella Vista 2 &mdash; Panel Admin</div>
  <div id="gps-info">&#128205; Verificando ubicacion...</div>

  <label for="empId">ID empleado</label>
  <input id="empId" type="text" placeholder="EMP001" autocomplete="off">

  <label for="empName">Nombre completo</label>
  <input id="empName" type="text" placeholder="Maria Garcia" autocomplete="off">

  <label>Camara</label>
  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <button id="btn-flip" onclick="flipCamera()" title="Voltear camara">&#8635;</button>
  </div>
  <canvas id="canvas"></canvas>

  <button id="btn" onclick="registrar()">&#128248; Tomar foto y registrar</button>
  <div id="msg"></div>
</div>

<script>
var API_URL = "https://p710uk49qg.execute-api.us-east-2.amazonaws.com/prod";
var LAT_SALON = -34.56579223324552;
var LON_SALON = -58.701169532763934;
var RADIO_M = 100;
var TOKEN_OK = (new URLSearchParams(location.search).get("token") || "") === "janos2026admin";
var currentFacing = "user";
var currentStream = null;

if (!TOKEN_OK) {
  document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif">' +
    '<div style="font-size:3rem">&#128274;</div>' +
    '<h2 style="color:#b91c1c;margin-top:16px">Acceso restringido</h2>' +
    '<p style="color:#64748b;margin-top:8px">Token de admin requerido</p></div>';
}

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

navigator.geolocation.getCurrentPosition(
  function(pos) {
    var dist = haversine(pos.coords.latitude, pos.coords.longitude, LAT_SALON, LON_SALON);
    var info = document.getElementById("gps-info");
    if (dist <= RADIO_M) {
      info.style.color = "#16a34a";
      info.textContent = "OK Ubicacion verificada - " + Math.round(dist) + "m del salon";
    } else {
      info.style.color = "#f59e0b";
      info.textContent = "Aviso: Registrando desde " + Math.round(dist) + "m del salon";
    }
  },
  function() {
    document.getElementById("gps-info").textContent = "Ubicacion no disponible";
  },
  { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
);

function startCamera(facing) {
  if (currentStream) {
    currentStream.getTracks().forEach(function(t) { t.stop(); });
    currentStream = null;
  }
  var constraints = { video: { facingMode: facing }, audio: false };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      currentStream = stream;
      document.getElementById("video").srcObject = stream;
    })
    .catch(function(err) {
      mostrarMsg("No se pudo acceder a la camara: " + err.message, false);
    });
}

function flipCamera() {
  currentFacing = (currentFacing === "user") ? "environment" : "user";
  startCamera(currentFacing);
}

function mostrarMsg(txt, ok) {
  var el = document.getElementById("msg");
  el.textContent = txt;
  el.className = ok ? "ok" : "err";
  el.style.display = "block";
}

async function registrar() {
  var empId   = document.getElementById("empId").value.trim();
  var empName = document.getElementById("empName").value.trim();
  if (!empId || !empName) { mostrarMsg("Completa ID y nombre.", false); return; }
  var btn = document.getElementById("btn");
  btn.disabled = true;
  mostrarMsg("Registrando...", true);
  var video  = document.getElementById("video");
  var canvas = document.getElementById("canvas");
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
  var b64 = canvas.toDataURL("image/jpeg", 0.9).split(",")[1];
  try {
    var res  = await fetch(API_URL + "/registrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ employeeId: empId, name: empName, imageBase64: b64 })
    });
    var data = await res.json();
    if (data.success) {
      mostrarMsg("OK " + empName + " registrado (FaceId: " + data.faceId.substring(0,8) + "...)", true);
      document.getElementById("empId").value   = "";
      document.getElementById("empName").value = "";
    } else {
      mostrarMsg("Error: " + (data.error || "desconocido"), false);
    }
  } catch(e) {
    mostrarMsg("Error de conexion: " + e.message, false);
  }
  btn.disabled = false;
}

startCamera(currentFacing);
</script>
</body>
</html>
