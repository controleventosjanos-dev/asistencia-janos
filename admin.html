<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}

     background:#f1f5f9;min-height:100vh;padding:24px}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.08);

</head>
<body>
<div class="card">
  <h2>冒聼聯聥 Registrar empleado</h2>
  <div class="salon-tag">Janos Bella Vista 2 芒聙聰 Panel Admin</div>
  <div id="gps-info">冒聼聯聧 Verificando ubicaci脙鲁n...</div>

  <label>ID empleado</label>
  <input id="empId" type="text" placeholder="EMP001">
  <label>Nombre completo</label>
  <input id="empName" type="text" placeholder="Mar脙颅a Garc脙颅a">
  <label>C脙隆mara</label>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <button id="btn" onclick="registrar()">冒聼聯赂 Tomar foto y registrar</button>
  <div id="msg"></div>
</div>

<script>
// 芒聰聙芒聰聙 CONFIG 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const API_URL   = "https://p710uk49qg.execute-api.us-east-2.amazonaws.com/prod";
const LAT_SALON = -34.56579223324552;
const LON_SALON = -58.701169532763934;
const RADIO_M   = 100;

// Token en URL para proteger el panel: admin.html?token=janos2026admin
const TOKEN_OK = (new URLSearchParams(location.search).get("token") || "") === "janos2026admin";
if (!TOKEN_OK) {
  document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif">' +
    '<div style="font-size:48px">冒聼聰聮</div><p style="margin-top:16px;color:#64748b">Acceso no autorizado</p></div>';
}

// 芒聰聙芒聰聙 GPS (informativo, no bloqueante) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

navigator.geolocation.getCurrentPosition(
  pos => {
    const dist = haversine(pos.coords.latitude, pos.coords.longitude, LAT_SALON, LON_SALON);
    const info = document.getElementById("gps-info");
    if (dist <= RADIO_M) {
      info.style.color = "#16a34a";
      info.textContent = "芒聹聯 Ubicaci脙鲁n verificada 芒聙聰 " + Math.round(dist) + "m del sal脙鲁n";
    } else {
      info.style.color: = "#f59e0b";
      info.textContent = "芒職陋 Registrando desde " + Math.round(dist) + "m del sal脙鲁n";
    }
  },
  () => {
    document.getElementById("gps-info").textContent = "冒聼聯聧 Ubicaci脙鲁n no disponible";
  },
  { enableHighAccuracy:] true, timeout: 10000, maximumAge: 0 }
);

// 芒聰聙芒聰聙 C脙隆mara 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
  .then(s => { document.getElementById("video").srcObject = s; })
  .catch(() => { mostrarMsg("No se pudo acceder a la c脙隆mara.", false); });

function mostrarMsg(txt, ok) {
  const el = document.getElementById("msg");
  el.textContent = txt;
  el.className = ok ? "ok" : "err";
  el.style.display = "block";
}

// 芒聰聙芒聰聙 Registro 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
aync function registrar() {
  const empId   = document.getElementById("empId").value.trim();
  const empName = document.getElementById("empName").value.trim();
  if (!empId || !empName) { mostrarMsg("Complet脙漏 ID y nombre.", false); return; }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  mostrarMsg("Registrando...", true);

  const video  = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  const b64 = canvas.toDataURL("image/jpeg", 0.9).split(",")[1];

  try {
    const res  = await fetch(API_URL + "/registrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ employeeId: empId, name: empName, imageBase64: b64 })
    });
    const data = await res.json();
    if (data.success) {
      mostrarMsg("芒聹聯 " + empName + " registrado (FaceId: " + data.faceId.substring(0,8) + "...)", true);
      document.getElementById("empId").value   = "";
      document.getElementById("empName").value = "";
    } else {
      mostrarMsg("Error: " + (data.error || "desconocido"), false);
    }
  } catch(e) {
    mostrarMsg("Error de conexi脙鲁n: " + e.message, false);
  }
  btn.disabled = false;
}
</script>
