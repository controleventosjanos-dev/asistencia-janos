<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JANOS – Control de Asistencia</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px}
  .logo{font-size:3rem;text-align:center;margin-bottom:4px}
  h1{font-size:1.3rem;font-weight:700;color:#38bdf8;text-align:center;margin-bottom:4px}
  .salon-tag{text-align:center;font-size:.95rem;color:#94a3b8;margin-bottom:20px;padding:8px 16px;background:#1e293b;border-radius:20px;display:inline-block}
  .card{background:#1e293b;border-radius:16px;padding:20px;width:100%;max-width:420px;border:1px solid #334155;margin-bottom:16px}
  #video{width:100%;border-radius:12px;background:#000;display:block;max-height:320px;object-fit:cover}
  #canvas{display:none}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:10px}
  .btn-scan{background:#6366f1;color:#fff}
  .btn-scan:hover{background:#4f46e5}
  .btn-scan:disabled{background:#334155;color:#64748b;cursor:not-allowed}
  .btn-flip{background:#475569;color:#fff;font-size:.85rem;padding:9px;margin-top:6px}
  .result{width:100%;max-width:420px;border-radius:16px;padding:24px;text-align:center;display:none}
  .result-ok{background:#064e3b;border:2px solid #10b981}
  .result-err{background:#450a0a;border:2px solid #ef4444}
  .result-warn{background:#431407;border:2px solid #f97316}
  .result-icon{font-size:3.5rem;margin-bottom:12px}
  .result-name{font-size:1.4rem;font-weight:800;margin-bottom:6px}
  .result-detail{font-size:.9rem;color:#94a3b8;line-height:1.6}
  .confidence{display:inline-block;background:rgba(255,255,255,.1);border-radius:20px;padding:3px 12px;font-size:.85rem;margin-top:6px}
  .gps-status{text-align:center;font-size:.8rem;padding:6px 12px;border-radius:20px;margin-bottom:12px;display:inline-block}
  .gps-ok{background:#064e3b;color:#34d399}
  .gps-wait{background:#1e3a5f;color:#93c5fd}
  .gps-err{background:#450a0a;color:#f87171}
  .spinner{display:inline-block;width:20px;height:20px;border:3px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tipo-btns{display:flex;gap:10px;margin-bottom:14px}
  .tipo-btn{flex:1;padding:10px;border:2px solid #334155;border-radius:10px;background:transparent;color:#94a3b8;font-weight:600;cursor:pointer;transition:all .2s;font-size:.9rem}
  .tipo-btn.active{border-color:#6366f1;color:#818cf8;background:#1e1b4b}
  .center{text-align:center}
</style>
</head>
<body>

<div class="logo">🪩</div>
<h1>Control de Asistencia</h1>
<div class="center"><span class="salon-tag" id="salonLabel">Cargando...</span></div>

<div id="gpsStatus" class="gps-status gps-wait">📍 Obteniendo ubicación...</div>

<div class="card">
  <div class="tipo-btns">
    <button class="tipo-btn active" id="btnEntrada" onclick="setTipo('entrada')">🟢 Entrada</button>
    <button class="tipo-btn" id="btnSalida"  onclick="setTipo('salida')">🔴 Salida</button>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <button class="btn btn-scan" id="btnScan" onclick="escanear()">📷 Verificar identidad</button>
  <button class="btn btn-flip" onclick="flipCam()">🔄 Cambiar cámara</button>
</div>

<div class="result" id="result">
  <div class="result-icon" id="resIcon"></div>
  <div class="result-name" id="resName"></div>
  <div class="result-detail" id="resDetail"></div>
  <button class="btn btn-scan" onclick="reiniciar()" style="margin-top:18px">↩ Volver</button>
</div>

const API_URL  = 'https://nha46wbuoo7ajwqqrsgzycavfi0rbcqh.lambda-url.us-east-2.on.aws';
const MAX_DIST = 100; // metros

var params    = new URLSearchParams(window.location.search);
var salonNom  = decodeURIComponent(params.get('salon') || '');
var salonData = SALONES[salonNom] || null;
var userLat   = null, userLng = null;
var gpsOk     = false;
var tipo      = 'entrada';
var stream    = null, facing = 'environment';

// Init
document.getElementById('salonLabel').textContent = salonNom || '⚠ Salón no especificado';

if (!salonNom || !salonData) {
  document.getElementById('gpsStatus').className = 'gps-status gps-err';
  document.getElementById('gpsStatus').textContent = '⚠ QR sin salón válido';
}

function setTipo(t) {
  tipo = t;
  document.getElementById('btnEntrada').className = 'tipo-btn' + (t==='entrada'?' active':'');
  document.getElementById('btnSalida').className  = 'tipo-btn' + (t==='salida' ?' active':'');
}

// GPS
function obtenerGPS() {
  if (!navigator.geolocation) {
    setGPSStatus('err', '📍 GPS no disponible en este dispositivo');
    gpsOk = true; // allow without GPS
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      if (salonData) {
        var dist = haversine(userLat, userLng, salonData.lat, salonData.lng);
        if (dist <= MAX_DIST) {
          setGPSStatus('ok', '✅ Ubicación verificada — ' + Math.round(dist) + 'm del salón');
          gpsOk = true;
        } else {
          setGPSStatus('err', '⛔ Estás a ' + Math.round(dist) + 'm del salón (máx ' + MAX_DIST + 'm)');
          gpsOk = false;
        }
      } else {
        setGPSStatus('ok', '📍 GPS: ' + userLat.toFixed(5) + ', ' + userLng.toFixed(5));
        gpsOk = true;
      }
    },
    function(err) {
      setGPSStatus('warn', '⚠ No se pudo obtener ubicación — se permitirá igualmente');
      gpsOk = true;
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function setGPSStatus(tipo, txt) {
  var el = document.getElementById('gpsStatus');
  el.className = 'gps-status gps-' + tipo;
  el.textContent = txt;
}

function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(a));
}

async function iniciarCam(f) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: f, width:{ideal:640}, height:{ideal:480} },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    mostrarResult('err','❌','Sin cámara','No se pudo acceder: '+e.message);
  }
}

function flipCam() {
  facing = facing==='user'?'environment':'user';
  iniciarCam(facing);
}

async function escanear() {
  if (!gpsOk) {
    mostrarResult('err','⛔','Fuera de rango','Debés estar dentro de los ' + MAX_DIST + 'm del salón para marcar asistencia.');
    return;
  }

  var btn = document.getElementById('btnScan');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verificando...';

  var video  = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  var b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  var payload = {
    imageBase64: b64,
    salon:       salonNom,
    tipo:        tipo,
    userLat:     userLat,
    userLng:     userLng,
    salonLat:    salonData ? salonData.lat : null,
    salonLng:    salonData ? salonData.lng : null
  };

  try {
    var res  = await fetch(API_URL + '/verificar', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    var data = await res.json();

    if (data.matched) {
      var tipoTxt = tipo === 'entrada' ? '🟢 ENTRADA' : '🔴 SALIDA';
      mostrarResult('ok','✅', data.name,
        tipoTxt + ' registrada\n' + salonNom + '\n' +
        '<span class="confidence">Confianza: ' + data.confidence + '%</span>');
    } else if (data.reason === 'fuera_de_rango') {
      mostrarResult('warn','⛔','Fuera de rango',
        'Estás a ' + data.distancia + 'm del salón.\nMáximo permitido: ' + data.maximo + 'm.');
    } else if (data.reason === 'no_face') {
      mostrarResult('err','😶','Sin rostro detectado','Posicioná tu cara frente a la cámara con buena iluminación.');
    } else {
      mostrarResult('err','❌','No reconocido','Rostro no encontrado en la base de datos.\nContactá al administrador.');
    }
  } catch(e) {
    mostrarResult('err','❌','Error de conexión', e.message);
  }

  btn.disabled = false;
  btn.innerHTML = '📷 Verificar identidad';
}

function mostrarResult(tipo, icon, name, detail) {
  document.getElementById('result').className    = 'result result-' + tipo;
  document.getElementById('result').style.display = 'block';
  document.getElementById('resIcon').textContent  = icon;
  document.getElementById('resName').textContent  = name;
  document.getElementById('resDetail').innerHTML  = detail.replace(/\n/g,'<br>');
  document.querySelector('.card').style.display   = 'none';
}

function reiniciar() {
  document.getElementById('result').style.display = 'none';
  document.querySelector('.card').style.display   = 'block';
  obtenerGPS();
}

// Start
obtenerGPS();
iniciarCam(facing);
</script>
